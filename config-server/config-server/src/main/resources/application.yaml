server:
  port: 8079

spring:
  application:
    name: CONFIG-SERVER

  cloud:
    config:
      server:
        git:
          uri: ${GITHUB_URL:https://github.com/Vinayak9623/Easy-Buy-config}
          username: ${GITHUB_USERNAME}
          password: ${GITHUB_PASSWORD}
          defaultLabel: main

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  instance:
    preferIpAddress: true
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}


