spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
  application:
    name: API-GATEWAY

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

  instance:
      preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    gateway:
      access: READ_ONLY

server:
  port: 8080

product:
  service:
    id: lb://PRODUCT-SERVICE

cart-order:
  service:
    id: lb://CART-ORDER-SERVICE
